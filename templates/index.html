<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail Generator - Rexden</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="container">
        <h2>Generate Emails</h2>
        <form method="POST">
            <label for="email_count">Number of Emails:</label>
            <input type="number" id="email_count" name="email_count" value="100" min="1" max="500" required />

            <button type="submit">Generate Emails</button>
        </form>
    </div>
</body>
</html>
